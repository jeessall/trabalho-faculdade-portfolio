<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

    <title>Contato</title>
</head>
<body>
    <main>
        <div class="cartao">
            <div class="minhas-informacoes">
                <h2 class="nome">Contato</h2>
                <p class="cargo">Me mande uma mensagem</p>
                <p class="cargo">jessica@software.com</p>
            </div>

            <div class="conteudo">
                <div class="informacoes-abas">
                    <div class="informacao selecionado">
                        <form class="formulario-contato" onsubmit="enviarFormulario(event)">
                            
                            <label>Seu nome</label>
                            <input type="text" id="nome" name="nome" required>

                            <label>email</label>
                            <input type="email" id="email" name="email" required>

                            <label>Mensagem</label>
                            <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

                            <button type="submit">Enviar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="index.js"></script>
    
</body>
</html>
